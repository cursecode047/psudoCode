name: Java CI/CD Pipeline with Maven

# Triggers the workflow on push or pull request events for the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Java JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Change to '11' or '21' depending on your project version
          distribution: 'temurin' # Popular, reliable OpenJDK distribution
          cache: 'maven' # Automatically caches Maven dependencies to speed up builds

      # Step 3: Build the application and run tests
      - name: Build with Maven
        run: mvn clean package

      # Optional Step 4: Upload the compiled JAR/WAR file as an artifact
      - name: Upload Build Artifact
        uses: actions/artifacts@v4
        with:
          name: java-app-binary
          path: target/*.jar # Adjust if your build outputs a .war file

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 5: Download the JAR artifact from the build step
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app-binary
          path: target/

      - name: Deploy Application
        run: |
          echo "Deploying Java application..."
          # Add your specific deployment commands here
          # Example: SCPing the JAR to a production server, building a Docker image, or pushing to AWS/Azure.